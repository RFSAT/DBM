bogus-priv
dhcp-range=192.168.50.100,192.168.50.150,255.255.255.0,12h

# --- Fixed reservations: REPLACE the MAC addresses below ---
dhcp-host=AA:BB:CC:DD:EE:11,front,192.168.50.11
