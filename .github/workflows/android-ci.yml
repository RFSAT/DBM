name: Android CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: '17' }
      - name: Fetch non-committed model assets
        run: |
          cd android/app/src/main/assets
          # face_landmarker.task and the EfficientDet fallback are NOT committed
          # (large / .gitignored) so are fetched here. The detection models
          # yolo26n.tflite, gtsrb_sign.tflite and traffic_light.tflite are
          # committed and validated; do NOT overwrite them.
          curl -fLO https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task
          curl -fL -o efficientdet_lite0.tflite https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/latest/efficientdet_lite0.tflite
      - name: Build
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.10.2
          ./gradlew lint assembleDebug
      - uses: actions/upload-artifact@v5
        with: { name: DBM-apk, path: android/app/build/outputs/apk/debug/*.apk }
      - uses: actions/upload-artifact@v5
        if: always()
        with: { name: lint-report, path: android/app/build/reports/lint-results-*.html }
